# ============================================
# Mycrop Docker Compose — 一键拉起完整环境
# ============================================
# 使用方法:
#   1. cp packages/server/.env.example .env
#   2. 编辑 .env 填入你的 LLM API Key
#   3. docker compose up -d
# ============================================

services:
  # ---- PostgreSQL + pgvector ----
  db:
    image: pgvector/pgvector:pg16
    container_name: mycrop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-me_corp}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend (Node.js + Express) ----
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mycrop-server
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    environment:
      PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-me_corp}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (Vite → Nginx) ----
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_API_URL: http://localhost:${PORT:-3002}
    container_name: mycrop-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
